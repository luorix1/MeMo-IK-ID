# Deploy ``runs/0423_ik_id_knee_huber_noise`` via TensorRT engine.
#
# Required in run_dir:
#   - best_model.trt   (from knee-exo-ctrl/convert_and_smoketest_trt.sh)
#   - best_model.pt    (normalization + IK indices + window_size)
#   - config.json      (rollout/sample-rate sanity checks)
#
# I/O:
#   input  (per leg):  (1, 2, T) normalized [knee angle, knee angular rate]
#   output (per leg):  last timestep knee moment (N·m/kg)

joint_velocity_source: "imu_gyro_delta"
imu_gyro_z_units: "deg_per_s"
imu_gyro_filter_tau: 0.15

trial_name: "trial_0423_knee_id_trt"
exo_on: true
trigger_type: "typing"
side: "left"
scale: 0.1
torque_limit: 5.0

controller_name: "ik_id_knee_trt"

run_dir: "runs/0423_ik_id_knee_huber_noise"
trt_path: "knee-exo-ctrl/best_model_0423_knee.trt"
# checkpoint_path: "runs/0423_ik_id_knee_huber_noise/best_model.pt"

frame_length: 100

fs: 100
rollout_decimate_step: 2

moment_mass_kg: 88.0
torque_sign_r: 1.0
torque_sign_l: 1.0

knee_filter_tau: 0.05

can_channel: "can0"
teleplot_ip: "127.0.0.1"
teleplot_port: 47269
teleplot_gyro_z_index: 5

teensy_id_left: 256
teensy_id_right: 512

use_gpio: true
GPIO_OUTPUT_PIN: 7
PULSE_WIDTH_SEC: 0.2
GPIO_START_DELAY_SEC: 2.0

exp_time_sec: 360

jetson_teensy_python_path: "/home/exov3/Documents/Rajiv/Jetson_Teensy_Comms"
