# Deploy ``runs/0423_ik_id_knee_huber_noise`` (trainV2 sagittal_knee, unilateral windows).
#
# Requires in the run directory:
#   - best_model.onnx   (e.g. from: python convert_to_onnx.py --checkpoint .../best_model.pt --seq-len 100)
#   - best_model.pt     (for normalization + IK indices + window_size)
#   - config.json       (saved by trainV2; used for sample-rate / rollout sanity check)
#
# Model I/O (matches KineticsTCNDataset / TCN):
#   input:  (1, 2, T)  — normalized knee angle + knee angular rate (rad, rad/s) for one leg
#   output: (1, 1, T)  — knee moment (N·m/kg); last timestep is used for control.
#
# Hardware:
#   - Angle: motor encoder (deg → rad), left leg sign flip like ``main_knee.py``.
#   - Joint rate: ``imu_gyro_delta`` = sagittal thigh/shank gyro-Z difference (rad/s), same
#     signal chain as ``knee-exo-ctrl`` ``impedance_rl`` (LPF per segment, then −thigh+shank).
#     Set ``joint_velocity_source: encoder`` to use motor velocity instead.
#
# Training used IK velocities; deploying with IMU-derived rate is a domain shift—retrain or
# calibrate if needed. Align ``torque_sign_*`` with your actuator.

joint_velocity_source: "imu_gyro_delta"
imu_gyro_z_units: "deg_per_s"
imu_gyro_filter_tau: 0.15

trial_name: "trial_0423_knee_id_onnx"
exo_on: true
trigger_type: "typing"
side: "both"
scale: 1.0
torque_limit: 18.0

controller_name: "ik_id_knee_onnx"

# Directory is resolved under os_kinetics/ if relative.
run_dir: "runs/0423_ik_id_knee_huber_noise"
# onnx_path: "runs/0423_ik_id_knee_huber_noise/best_model.onnx"
# checkpoint_path: "runs/0423_ik_id_knee_huber_noise/best_model.pt"

onnx_providers:
  - "TensorrtExecutionProvider"
  - "CUDAExecutionProvider"
  - "CPUExecutionProvider"

# Match trainV2 ``window_size`` (see config.json / checkpoint).
frame_length: 100

# Control loop rate: with ``rollout: true`` data are ~100 Hz (200 Hz native, decimate 2).
fs: 100
# Fallback if ``config.json`` is not copied to the Jetson (must match training).
rollout_decimate_step: 2

# N·m/kg → N·m (approximate exo torque scale; tune per subject / calibration).
moment_mass_kg: 88.0
torque_sign_r: 1.0
torque_sign_l: 1.0

# Applied to encoder angle (both modes) and to encoder joint velocity when ``joint_velocity_source: encoder``.
knee_filter_tau: 0.05

can_channel: "can0"
teleplot_ip: "127.0.0.1"
teleplot_port: 47269
# IMU layout: accel xyz = 0..2, gyro xyz = 3..5 (matches hip-exo-ctrl ``teleplot_gyro_y_index``).
teleplot_gyro_z_index: 5

teensy_id_left: 256
teensy_id_right: 512

use_gpio: true
GPIO_OUTPUT_PIN: 7
PULSE_WIDTH_SEC: 0.2
GPIO_START_DELAY_SEC: 2.0

exp_time_sec: 360

jetson_teensy_python_path: "/home/exov3/Documents/Rajiv/Jetson_Teensy_Comms"
