# ---------------------------------------------------------------
# Unilateral Knee Cascade Controller — Config
# Controller : cascade_uni
# Model      : os_kinetics TCN (sagittal_knee, unilateral)
#
# Model input  : (1, 2, frame_length)
#   ch0 — knee encoder angle  (rad, sign-corrected: +ve = extension)
#   ch1 — knee angular velocity: shank_gz − thigh_gz (rad/s, sign-corrected)
# Model output : (1, 1) → knee joint moment (Nm), applied directly as torque
# ---------------------------------------------------------------

trial_name: "cascade_0425"
exo_on: true
trigger_type: "typing"

# "right" or "left" — only this side sends torque; the other side gets 0
side: "right"

controller_name: "cascade_uni"
trt_engine_path: "/home/exov3/MeMo-IK-ID/knee-exo-ctrl/cascade.trt"

frame_length: 100
input_size: 2
output_size: 1
fs: 100
exp_time_sec: 360

# ---- output scaling ----
# Training moments are stored as Nm/kg (body-mass normalized).
# The controller multiplies model output by mass to get Nm, then by torque_scale.
# Final torque (Nm) = model_out (Nm/kg) × mass (kg) × torque_scale
mass: 88.0           # subject body mass (kg) — update per subject
scale: 0.5    # dimensionless gain (set < 1.0 to reduce assistance)
torque_limit: 5.0   # hard clamp (Nm)

# ---- normalization stats from training checkpoint ----
# Source: runs/0423_ik_id_knee_huber_noise/best_model.pt  → ckpt["normalization"]
# Both sides are normalized identically (unilateral training sign-corrects left
# side to match right convention before statistics were computed).
#
# ch0: knee encoder angle (rad)
knee_angle_mean: -0.5066
knee_angle_std:   0.3985

# ch1: knee angular velocity — shank_gz minus thigh_gz (rad/s)
knee_vel_mean:  0.0417
knee_vel_std:   2.9439

# ---- hardware ----
can_channel: "can0"
teleplot_ip: "127.0.0.1"
teleplot_port: 47269
teensy_id_left: 256
teensy_id_right: 512

# ---- GPIO sync pulses ----
GPIO_OUTPUT_PIN: 7
PULSE_WIDTH_SEC: 0.2
GPIO_START_DELAY_SEC: 2.0
