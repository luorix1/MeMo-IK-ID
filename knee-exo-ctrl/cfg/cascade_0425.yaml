# ---------------------------------------------------------------
# Bilateral Knee Biotorque Controller — Config
# Controller : biotorque
# Model input : (1, 3, T)
#   ch0 — thigh gyro-y (rad/s, z-scored)
#   ch1 — shank gyro-y (rad/s, z-scored)
#   ch2 — knee angle (rad, z-scored)
# Model output: scalar (Nm/kg), multiplied by mass × biotorque_gain
# ---------------------------------------------------------------

trial_name: "cascade_test"
exo_on: true
trigger_type: "typing"
side: "left"

scale: 1.0
torque_limit: 5.0

controller_name: "biotorque"
trt_engine_path: "/home/exov3/Documents/Knee_CTRL/tcn_model/s2s_controller_042326.trt"

frame_length: 95
input_size: 3
output_size: 1
fs: 100
exp_time_sec: 360

# ---- subject parameters ----
mass: 75             # kg — update per subject
biotorque_gain: 0.4  # scale factor applied to (model_out × mass)
delay: 0.01          # output delay (s)

# ---- normalization stats (update from training dataset before use) ----
# ch0: thigh gyro-y (rad/s)
thigh_gy_mean: 0.055450295937000856
thigh_gy_std:  1.1165396098811977

# ch1: shank gyro-y (rad/s)
shank_gy_mean: 0.006567863846775384
shank_gy_std:  0.4670627184722982

# ch2: knee angle (rad)
knee_mean: -0.7897140174236675
knee_std:   0.6707084034037843

# ---- hardware ----
can_channel: "can0"
teleplot_ip: "127.0.0.1"
teleplot_port: 47269
teensy_id_left: 256
teensy_id_right: 512

# ---- GPIO sync pulses ----
GPIO_OUTPUT_PIN: 7
PULSE_WIDTH_SEC: 0.2
GPIO_START_DELAY_SEC: 2.0
