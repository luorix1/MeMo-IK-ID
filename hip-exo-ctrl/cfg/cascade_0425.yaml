# cfg/hip_biotorque_default.yaml
# Hip Exo Biotorque Controller — reference configuration
# Copy and edit for each subject/session.

# ── Trial metadata ─────────────────────────────────────────────────────
trial_name: "SUB01"           # prefix for saved CSV files
subject:    "SUB01"

# ── Experiment timing ──────────────────────────────────────────────────
exp_time_sec:         368     # total recording buffer (s); 5 s overhead added automatically
target_time_range_sec: 360   # duration between start and end GPIO pulses (s)
fs:                   100    # control frequency (Hz)

# ── Trigger ───────────────────────────────────────────────────────────
trigger_type: "typing"        # "typing" or "mocap"
mocap_server_ip:   "172.24.44.177"
mocap_server_port: 10

# ── Exo enable / torque ────────────────────────────────────────────────
exo_on:       false           # set true to actually apply torques
torque_limit: 5.0            # hard clamp, Nm

# ── Model ─────────────────────────────────────────────────────────────
controller_name: "hip_biotorque"
trt_engine_path: "/home/metamobility2/Jimin/Trained Models IMUonly_fixed/OpenSim/DEP/OpenSim_ALL_DEP_LG_0403/OpenSim_ALL_DEP_LG_0403.trt"
# Normalization .npy files are expected in the same directory as the engine:
#   input_mean.npy, input_std.npy, label_mean.npy, label_std.npy
frame_length: 100              # rolling window length (frames)

# ── Subject parameters ─────────────────────────────────────────────────
mass: 88                      # body mass, kg

# ── Biotorque pipeline ─────────────────────────────────────────────────
scale_factor:     0.0         # 0 = zero assist; 1 = full bio-torque
desired_delay_ms: 110         # added delay (ms); min meaningful value ≈ 40
                              # delay_steps = int(desired_delay_ms / 10 - 4)
lpf_cutoff_Hz:    10.0        # low-pass filter cutoff (Hz)
lpf_order:        2           # Butterworth filter order

# ── Hardware ──────────────────────────────────────────────────────────
can_channel: "can0"
can_id_L:    1                # CAN node ID for left motor
can_id_R:    2                # CAN node ID for right motor
motor_type:  "AK80-9"

# ── GPIO sync pulses ──────────────────────────────────────────────────
gpio_output_pin:    7         # Jetson board pin
gpio_start_delay_sec: 3.0    # seconds after trigger before first pulse
pulse_width_sec:    0.2       # pulse duration (s)

# ── Teleplot ──────────────────────────────────────────────────────────
teleplot_ip:   "127.0.0.1"
teleplot_port: 47269
