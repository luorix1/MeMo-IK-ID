# Dual hip exoskeleton — simgyro3 (same teleplot / GPIO / timing fields as knee-exo-ctrl).

trial_name: AB01_Ilseung-simulation_LG
exo_on: true
trigger_type: typing

side: both

controller_name: simgyro3
controller:
  engine_path: ../models/student_tcn_gyro3_epoch4.trt
  frame_len: 95
  mean_std_path: ../mean_std/stats_results.npz

fs: 100
exp_time_sec: 360

scale: 1.0
torque_limit: 15.0

invert_right_torque_cmd: true

motor_backend: tmotor_v3
sensor_package: hip_exo.sensor_motor
sensor_python_paths:
  - /home/metamobility1/Public/hip_exo/hip_exo

can_channel: can0
can_id_L: 1
can_id_R: 2
motor_model: AK80-9
frame_length: 95

teleplot_ip: "127.0.0.1"
teleplot_port: 47269

GPIO_OUTPUT_PIN: 7
PULSE_WIDTH_SEC: 0.2
GPIO_START_DELAY_SEC: 2.0
